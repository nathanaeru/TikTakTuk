{% extends 'base.html' %}

{% block title %}
  Daftar Artis - TikTakTuk
{% endblock %}

{% block content %}
  <div class="max-w-7xl mx-auto px-8 py-10">
    <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
      <div>
        <h1 class="text-3xl font-bold text-white mb-2">Daftar Artis</h1>
        <p class="text-gray-400">Kelola artis yang ada di platform TikTakTuk</p>
      </div>
      <button class="bg-primary hover:bg-primaryHover text-white font-medium px-5 py-2.5 rounded-lg transition-colors flex items-center gap-2"><span>+</span> Tambah Artis</button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
      <div class="bg-dark-card border border-dark-border rounded-xl p-6">
        <p class="text-sm text-gray-400 mb-1">TOTAL ARTIS</p>
        <h3 class="text-3xl font-bold text-white">6</h3>
      </div>
    </div>

    <div class="bg-dark-card border border-dark-border rounded-xl overflow-hidden">
      <div class="p-4 border-b border-dark-border flex justify-between items-center bg-dark-bg/50">
        <input type="text" placeholder="Cari nama atau genre..." class="bg-dark-bg border border-dark-border rounded-lg px-4 py-2 text-sm text-gray-200 focus:border-primary focus:outline-none w-full max-w-md" />
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-left text-sm text-gray-300">
          <thead class="text-xs text-gray-500 uppercase bg-dark-bg/80 border-b border-dark-border">
            <tr>
              <th class="px-6 py-4 font-medium">Nama Artis</th>
              <th class="px-6 py-4 font-medium">Genre</th>
              <th class="px-6 py-4 font-medium text-right">Aksi</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-dark-border">
            <tr class="hover:bg-dark-bg/50 transition-colors">
              <td class="px-6 py-4 font-medium text-white flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-blue-500/20 text-primary flex items-center justify-center font-bold">F</div>Fourtwnty
              </td>
              <td class="px-6 py-4">
                <span class="text-green-400 bg-green-400/10 px-2 py-1 rounded text-xs">Indie Folk</span>
              </td>
              <td class="px-6 py-4 text-right space-x-3">
                <button class="text-gray-400 hover:text-white transition-colors">Edit</button>
                <button class="text-red-500 hover:text-red-400 transition-colors">Hapus</button>
              </td>
            </tr>
            <tr class="hover:bg-dark-bg/50 transition-colors">
              <td class="px-6 py-4 font-medium text-white flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-blue-500/20 text-primary flex items-center justify-center font-bold">H</div>Hindia
              </td>
              <td class="px-6 py-4">
                <span class="text-blue-400 bg-blue-400/10 px-2 py-1 rounded text-xs">Indie Pop</span>
              </td>
              <td class="px-6 py-4 text-right space-x-3">
                <button class="text-gray-400 hover:text-white transition-colors">Edit</button>
                <button class="text-red-500 hover:text-red-400 transition-colors">Hapus</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="hidden fixed inset-0 z-50 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-dark-card border border-dark-border rounded-2xl w-full max-w-md p-6 shadow-2xl">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold text-white">Tambah Artis Baru</h2>
        <button class="text-gray-400 hover:text-white">✕</button>
      </div>
      <form class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-gray-400 mb-1">NAMA ARTIS *</label>
          <input type="text" name="name" placeholder="cth. Fourtwnty" class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-2 text-gray-200 focus:border-primary focus:outline-none" />
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-400 mb-1">GENRE</label>
          <input type="text" name="genre" placeholder="cth. Indie Folk" class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-2 text-gray-200 focus:border-primary focus:outline-none" />
        </div>
        <div class="flex gap-3 pt-4">
          <button type="button" class="flex-1 bg-dark-bg border border-dark-border text-gray-300 hover:text-white py-2.5 rounded-lg transition-colors">Batal</button>
          <button type="submit" class="flex-1 bg-primary hover:bg-primaryHover text-white font-medium py-2.5 rounded-lg transition-colors">Tambah Artis</button>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
