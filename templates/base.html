<!DOCTYPE html>
<html lang="id" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {% block title %}
        TikTakTuk
      {% endblock %}
    </title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#3b82f6',
              primaryHover: '#2563eb',
              dark: {
                bg: '#0f172a',
                card: '#1e293b',
                border: '#334155'
              }
            }
          }
        }
      }
    </script>
  </head>
  <body class="bg-dark-bg text-gray-200 font-sans min-h-screen flex flex-col antialiased">
    <nav class="sticky top-0 z-50 bg-dark-bg/80 backdrop-blur-md border-b border-dark-border px-8 py-4 flex justify-between items-center">
      <div class="flex items-center gap-8">
        <a href="/" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
          <div class="bg-primary text-white p-1.5 rounded text-sm font-bold">TT</div>
          <span class="text-xl font-bold text-white tracking-wide">TikTakTuk</span>
        </a>

        <div class="hidden md:flex gap-6 text-sm font-medium text-gray-400">
          <a href="#" class="hover:text-white transition-colors">Jelajahi Acara</a>
          <a href="#" class="hover:text-white transition-colors">Promosi</a>
          <a href="#" class="hover:text-white transition-colors">Artis</a>
          <a href="#" class="hover:text-white transition-colors">Venue</a>
        </div>
      </div>

      <div class="flex items-center gap-4">
        <a href="#" class="text-sm font-medium text-gray-300 hover:text-white transition-colors">Login</a>
        <a href="#" class="bg-primary hover:bg-primaryHover text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors">Daftar</a>
      </div>
    </nav>

    <main class="flex-grow">
      {% block content %}

      {% endblock %}
    </main>

    <footer class="border-t border-dark-border mt-auto py-6">
      <div class="max-w-7xl mx-auto px-8 text-center text-sm text-gray-500">&copy; 2026 TikTakTuk - Platform Manajemen Pertunjukan & Tiket.</div>
    </footer>
  </body>
</html>
