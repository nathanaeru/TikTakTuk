{% extends 'base.html' %}

{% block title %}
  Daftar - TikTakTuk
{% endblock %}

{% block content %}
  <div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
    <div class="bg-dark-card/80 backdrop-blur-md border border-dark-border rounded-2xl p-8 max-w-lg w-full shadow-2xl">
      <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-white mb-2">Daftar untuk Memulai</h1>
        <p class="text-sm text-gray-400">Buat akun baru untuk memulai pengalaman Anda</p>
      </div>

      <form method="POST" class="space-y-5">
        {% csrf_token %}
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-300 mb-3">Daftar Sebagai:</label>
          <div class="grid grid-cols-2 gap-4">
            <label class="cursor-pointer">
              <input type="radio" name="role" value="customer" class="peer sr-only" checked />
              <div class="rounded-lg border border-dark-border bg-dark-bg px-4 py-3 hover:border-primary peer-checked:border-primary peer-checked:bg-primary/10 transition-all text-center">
                <span class="block text-sm font-medium text-white mb-1">👤 Pelanggan</span>
              </div>
            </label>
            <label class="cursor-pointer">
              <input type="radio" name="role" value="organizer" class="peer sr-only" />
              <div class="rounded-lg border border-dark-border bg-dark-bg px-4 py-3 hover:border-primary peer-checked:border-primary peer-checked:bg-primary/10 transition-all text-center">
                <span class="block text-sm font-medium text-white mb-1">🎪 Penyelenggara</span>
              </div>
            </label>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-1.5">Nama Lengkap</label>
            <input type="text" name="full_name" placeholder="Nama sesuai KTP" required class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-2.5 text-gray-200 placeholder-gray-500 focus:border-primary focus:outline-none" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-1.5">Username</label>
            <input type="text" name="username" placeholder="Pilih username" required class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-2.5 text-gray-200 placeholder-gray-500 focus:border-primary focus:outline-none" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-1.5">Email</label>
            <input type="email" name="email" placeholder="contoh@email.com" required class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-2.5 text-gray-200 placeholder-gray-500 focus:border-primary focus:outline-none" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-1.5">Nomor Telepon</label>
            <input type="tel" name="phone" placeholder="+62..." required class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-2.5 text-gray-200 placeholder-gray-500 focus:border-primary focus:outline-none" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-1.5">Password</label>
            <input type="password" name="password" placeholder="Minimal 6 karakter" required class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-2.5 text-gray-200 placeholder-gray-500 focus:border-primary focus:outline-none" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-1.5">Konfirmasi Password</label>
            <input type="password" name="confirm_password" placeholder="Ulangi password" required class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-2.5 text-gray-200 placeholder-gray-500 focus:border-primary focus:outline-none" />
          </div>
        </div>

        <div class="flex items-center gap-2 mt-4">
          <input type="checkbox" required class="rounded bg-dark-bg border-dark-border text-primary focus:ring-primary" />
          <span class="text-sm text-gray-400">Saya setuju dengan <a href="#" class="text-primary hover:underline">Syarat & Ketentuan</a></span>
        </div>

        <button type="submit" class="w-full bg-primary hover:bg-primaryHover text-white font-medium py-3 rounded-lg transition-colors mt-6">Daftar</button>
      </form>

      <div class="mt-6 text-center text-sm text-gray-400">
        Sudah punya akun? <a href="{% url 'auth:login' %}" class="text-primary hover:text-blue-400 font-medium transition-colors">Login di sini</a>
      </div>
    </div>
  </div>
{% endblock %}
