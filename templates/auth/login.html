{% extends 'base.html' %}

{% block title %}
  Login - TikTakTuk
{% endblock %}

{% block content %}
  <div class="min-h-[80vh] flex items-center justify-center px-4">
    <div class="bg-dark-card/80 backdrop-blur-md border border-dark-border rounded-2xl p-8 max-w-md w-full shadow-2xl">
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-primary text-white font-bold text-xl mb-4 shadow-lg shadow-primary/30">TT</div>
        <h1 class="text-2xl font-bold text-white mb-2">Masuk ke Akun Anda</h1>
        <p class="text-sm text-gray-400">Gunakan kredensial Anda untuk mengakses platform</p>
      </div>

      <form method="POST" class="space-y-5">
        {% csrf_token %}
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1.5">Username</label>
          <input type="text" name="username" placeholder="Masukkan username" required class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-2.5 text-gray-200 placeholder-gray-500 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1.5">Password</label>
          <input type="password" name="password" placeholder="Masukkan password" required class="w-full bg-dark-bg border border-dark-border rounded-lg px-4 py-2.5 text-gray-200 placeholder-gray-500 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" />
        </div>

        <button type="submit" class="w-full bg-primary hover:bg-primaryHover text-white font-medium py-3 rounded-lg transition-colors mt-4">Masuk</button>
      </form>

      <div class="mt-6 text-center text-sm text-gray-400">
        Belum punya akun? <a href="{% url 'auth:register' %}" class="text-primary hover:text-blue-400 font-medium transition-colors">Daftar sekarang</a>
      </div>
    </div>
  </div>
{% endblock %}
