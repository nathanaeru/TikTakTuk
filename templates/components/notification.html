{# Global Notification Toast Component #}
<div id="notificationModal" class="fixed top-4 left-0 right-0 z-[9999] hidden px-4 pointer-events-none sm:top-6">
  <div id="notificationContent" class="pointer-events-auto mx-auto w-full max-w-md translate-y-[-8px] rounded-2xl border border-dark-border bg-dark-card shadow-2xl overflow-hidden transform transition-all duration-200 opacity-0">
    <div class="flex items-start gap-4 p-4 sm:p-5">
      <div id="notificationIconContainer" class="flex-shrink-0">
        <div id="notificationIcon" class="w-12 h-12 rounded-full flex items-center justify-center text-xl"></div>
      </div>

      <div class="min-w-0 flex-1 pr-8">
        <h3 id="notificationTitle" class="text-base font-bold text-white mb-1"></h3>
        <p id="notificationMessage" class="text-gray-300 text-sm leading-relaxed"></p>
      </div>

      <button id="notificationClose" class="flex-shrink-0 text-gray-400 hover:text-white transition-colors -mt-1 -mr-1" aria-label="Close notification">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <div class="h-1 bg-black/20">
      <div id="notificationProgress" class="h-full w-full origin-left scale-x-100"></div>
    </div>
  </div>
</div>
